<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>⚽ Tunisia Football Stats</title>

<style>
body {
    font-family: "Tahoma";
    direction: rtl;
    background: linear-gradient(135deg, #c1121f, #ffffff);
    color: #111;
    text-align: center;
}

h1 {
    background: #c1121f;
    color: white;
    padding: 15px;
    border-radius: 10px;
}

.container {
    width: 95%;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    margin: 15px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #c1121f;
    color: white;
}

th, td {
    padding: 8px;
    border: 1px solid #ddd;
}

.match {
    background: #f8f9fa;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.player {
    padding: 8px;
    margin: 5px;
    background: #eee;
    border-radius: 6px;
}

button {
    background: #c1121f;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 6px;
}

input {
    padding: 6px;
    margin: 5px;
}
</style>
</head>

<body>

<h1>🇹🇳 إحصائيات كرة القدم التونسية</h1>

<div class="container">

<div class="card">
<h2>🏆 ترتيب الفرق</h2>
<table id="teamsTable">
<thead>
<tr>
<th>الفريق</th><th>لعب</th><th>فاز</th><th>تعادل</th><th>خسر</th><th>نقاط</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="card">
<h2>⚽ المباريات</h2>
<div id="matches"></div>
<button onclick="addMatch()">➕ إضافة مباراة</button>
</div>

<div class="card">
<h2>🧑‍💼 اللاعبين</h2>
<input id="playerName" placeholder="اسم اللاعب">
<input id="playerTeam" placeholder="الفريق">
<button onclick="addPlayer()">إضافة لاعب</button>
<div id="players"></div>
</div>

</div>

<script>

// تحميل أو إنشاء بيانات
let teams = JSON.parse(localStorage.getItem("teams")) || [
{name:"الترجي",played:0,wins:0,draws:0,losses:0,points:0},
{name:"النجم الساحلي",played:0,wins:0,draws:0,losses:0,points:0},
{name:"النادي الإفريقي",played:0,wins:0,draws:0,losses:0,points:0}
];

let matches = JSON.parse(localStorage.getItem("matches")) || [];
let players = JSON.parse(localStorage.getItem("players")) || [];

// حفظ
function save() {
    localStorage.setItem("teams", JSON.stringify(teams));
    localStorage.setItem("matches", JSON.stringify(matches));
    localStorage.setItem("players", JSON.stringify(players));
}

// عرض الفرق
function renderTeams() {
    let tbody = document.querySelector("#teamsTable tbody");
    tbody.innerHTML = "";

    teams.sort((a,b)=>b.points-a.points);

    teams.forEach(t=>{
        tbody.innerHTML += `
        <tr>
        <td>${t.name}</td>
        <td>${t.played}</td>
        <td>${t.wins}</td>
        <td>${t.draws}</td>
        <td>${t.losses}</td>
        <td>${t.points}</td>
        </tr>`;
    });
}

// إضافة مباراة
function addMatch() {
    let t1 = teams[Math.floor(Math.random()*teams.length)];
    let t2 = teams[Math.floor(Math.random()*teams.length)];
    if(t1==t2) return;

    let s1 = Math.floor(Math.random()*4);
    let s2 = Math.floor(Math.random()*4);

    let matchPlayers = players.map(p => ({
        name: p.name,
        team: p.team,
        rating: (Math.random()*5+5).toFixed(1)
    }));

    matches.push({
        teamA:t1.name, teamB:t2.name,
        scoreA:s1, scoreB:s2,
        players: matchPlayers
    });

    t1.played++; t2.played++;

    if(s1>s2){t1.wins++;t2.losses++;t1.points+=3;}
    else if(s2>s1){t2.wins++;t1.losses++;t2.points+=3;}
    else {t1.draws++;t2.draws++;t1.points++;t2.points++;}

    save();
    renderAll();
}

// عرض المباريات
function renderMatches() {
    let div = document.getElementById("matches");
    div.innerHTML = "";

    matches.forEach(m=>{
        let playersHtml = m.players.map(p =>
            `<div class="player">${p.name} (${p.team}) ⭐ ${p.rating}</div>`
        ).join("");

        div.innerHTML += `
        <div class="match">
        <b>${m.teamA} ${m.scoreA} - ${m.scoreB} ${m.teamB}</b>
        ${playersHtml}
        </div>`;
    });
}

// إضافة لاعب
function addPlayer() {
    let name = document.getElementById("playerName").value;
    let team = document.getElementById("playerTeam").value;

    if(!name || !team) return;

    players.push({name, team});
    save();
    renderPlayers();
}

// عرض اللاعبين
function renderPlayers() {
    let div = document.getElementById("players");
    div.innerHTML = "";

    players.forEach(p=>{
        div.innerHTML += `<div class="player">${p.name} - ${p.team}</div>`;
    });
}

// تشغيل
function renderAll(){
    renderTeams();
    renderMatches();
    renderPlayers();
}

renderAll();

</script>

</body>
</html>
